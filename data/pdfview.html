<!DOCTYPE html><html><head><meta charset="utf-8"><style>body{margin:0;background:#222}img{display:block;width:100%}</style></head><body>
<div id="out"></div>
<script type="module">
import * as pdfjs from 'https://cdn.jsdelivr.net/npm/pdfjs-dist@4.6.82/build/pdf.min.mjs';
pdfjs.GlobalWorkerOptions.workerSrc = 'https://cdn.jsdelivr.net/npm/pdfjs-dist@4.6.82/build/pdf.worker.min.mjs';
const doc = await pdfjs.getDocument('../uploads/saleskit.pdf').promise;
for (const n of [7, 1, 20]) {
  const page = await doc.getPage(n);
  const vp = page.getViewport({ scale: 1.6 });
  const c = document.createElement('canvas');
  c.width = vp.width; c.height = vp.height;
  await page.render({ canvasContext: c.getContext('2d'), viewport: vp }).promise;
  const img = new Image();
  img.src = c.toDataURL('image/png');
  document.getElementById('out').appendChild(img);
}
document.title = 'RENDERED';
</script>
</body></html>
